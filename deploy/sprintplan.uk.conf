# Apache vhost for sprintplan.uk — a STATIC site (no Node, no proxy).
# Serves the repo's public/ directly, like retrospective. certbot --apache
# augments this with the :443 vhost + an 80->443 redirect at issue time.
#
# Install:
#   sudo cp /var/www/plan/deploy/sprintplan.uk.conf /etc/apache2/sites-available/
#   sudo a2ensite sprintplan.uk
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
# Then: sudo certbot --apache -d sprintplan.uk
<VirtualHost *:80>
    ServerName sprintplan.uk

    DocumentRoot /var/www/plan/public

    <Directory /var/www/plan/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Modest cache for the un-fingerprinted static assets, so an update is
        # picked up within the hour rather than being pinned indefinitely.
        ExpiresActive On
        ExpiresDefault "access plus 1 hour"
        ExpiresByType text/html "access plus 0 seconds"
    </Directory>

    # Security headers (supersedes retrospective's legacy X-XSS-Protection).
    # Suite parity: DENY framing, HSTS, CSP, Permissions-Policy. The :443 vhost
    # certbot adds inherits nothing automatically — the operator mirrors these
    # there (or onto the :443 block) when applying the live change.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()"

    ErrorLog ${APACHE_LOG_DIR}/sprintplan_error.log
    CustomLog ${APACHE_LOG_DIR}/sprintplan_access.log combined
</VirtualHost>
