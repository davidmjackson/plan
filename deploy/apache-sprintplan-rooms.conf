# MP6 — reverse-proxy snippet to ADD inside the EXISTING sprintplan.uk SSL
# <VirtualHost *:443>. apache keeps serving the static client (the free local
# app, unchanged); only the dynamic multiplayer surface is proxied to the node
# service on 127.0.0.1:3014. This keeps the browser same-origin: the ws and the
# /rooms fetch both go to sprintplan.uk (no CORS, no client change).
#
# Enable first:  sudo a2enmod proxy proxy_http proxy_wstunnel rewrite
# Then add the block below, `apachectl configtest`, and reload.
# (Directives are illustrative — adapt to the existing vhost; the load-bearing
#  set is: WebSocket upgrade + /rooms + /auth/ + /api/heartbeat + /auth-client/.)

# 1) WebSocket upgrade — the room socket connects same-origin at "/?room=...".
#    Match the Upgrade header and tunnel to the node service (query preserved).
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/?(.*) "ws://127.0.0.1:3014/$1" [P,L]

# 2) Dynamic HTTP endpoints → node. Everything else falls through to the
#    existing static DocumentRoot (apache serves public/ as today).
ProxyPreserveHost On
ProxyPass        /rooms          http://127.0.0.1:3014/rooms
ProxyPassReverse /rooms          http://127.0.0.1:3014/rooms
ProxyPass        /auth/          http://127.0.0.1:3014/auth/
ProxyPassReverse /auth/          http://127.0.0.1:3014/auth/
ProxyPass        /auth-client/   http://127.0.0.1:3014/auth-client/
ProxyPassReverse /auth-client/   http://127.0.0.1:3014/auth-client/
ProxyPass        /api/heartbeat  http://127.0.0.1:3014/api/heartbeat
ProxyPassReverse /api/heartbeat  http://127.0.0.1:3014/api/heartbeat
